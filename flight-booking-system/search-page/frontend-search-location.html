<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Flight website front page</title>
    <link rel="stylesheet" href="frontend-search-box.css">
    <script src="../shared-code/util/swap-button.js"></script>
    <script src="../shared-code/util/searchtimes.js" defer></script>
</head>

<body>
    <!-- Slogan for airline -->
    <div class="frontpage-slogan">
        Fly beyond the clouds
    </div>

    <!-- display group name -->
    <div class="frontpage-group-name">
        LikeaG6
    </div>

    <div class="search-box">
        <div class="search-location">
            <!-- class input-with-icon to group icon and input side by side -->
            <div class="input-with-icon">
                <img src="images/icon-from.png" class="icon icon-layout" alt="From">
                <input id="departure" type="text" placeholder="Try: LAX">
            </div>

            <button class="swap-button-icon" aria-label="Switch location" onclick="swapLocations()">
                <img src="images/icon-swap.png" class="icon" alt="Swap location">
            </button>

            <div class="input-with-icon">
                <img src="images/icon-to.png" class="icon icon-layout" alt="To">
                <input id="arrival" type="text" placeholder="Try: JFK">
            </div>

            <!-- Date and Time input -->
            <div class="calendar-box">
                <input id="departureDate" type="date">
                <select id="departureHour"></select>
            </div>

            <!-- Search Flight button -->
            <button id="searchButton" class="layout-search-button">
               Search <br> Flight
            </button>
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const btn = document.getElementById("searchButton");
        if (btn) {
            btn.addEventListener("click", () => {
                recordSearch();
                window.location.href = "../results-page/flight-search-results.html";
            });
        }
    });
	</script>
        </div>
    </div>

    <!-- Container to show search results -->
    <div id="flight-times" style="margin-top: 20px;"></div>

    <!-- background picture credit -->
    <div class="background-picture-credit">
        Image: Over the clouds by Stephan Mahlke
    </div>
</body>
</html>
